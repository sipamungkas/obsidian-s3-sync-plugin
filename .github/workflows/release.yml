name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bump version
        run: node version-bump.mjs ${{ github.ref_name }}

      - name: Build
        run: npm run build

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## Install

            - Via Obsidian Community Plugins (once approved)
            - Manual: download `main.js`, `manifest.json`, and `styles.css` to `.obsidian/plugins/s3-sync/`

            ## Changes

            See [commits](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}).
          files: |
            main.js
            manifest.json
            styles.css
          fail_on_unmatched_files: true
          generate_release_notes: true
